<script>
// 🔹 GLOBAL STATE
const API_KEY = '0c0adab3c8cc353020af11d03821e94d';
let currentHistory = [];

// 🔹 HEAT CHECK (UNCHANGED)
async function checkHeat() {
  const city = document.getElementById('city').value.trim();
  if (!city) return alert('Please enter location.');
  
  document.getElementById('loading').style.display = 'block';
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${API_KEY}`);
    const data = await res.json();
    if(data.cod !== 200) throw new Error('Location not found');
    
    const utcNow = Math.floor(Date.now() / 1000);
    const locTime = new Date((utcNow + data.timezone) * 1000);

    const dateStr = locTime.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric', timeZone:'UTC' });
    const timeStr = locTime.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', timeZone:'UTC' });

    document.getElementById('datetimeVal').textContent = `${dateStr} | ${timeStr}`;
    document.getElementById('datetimeCard').style.display = 'block';

    const temp = data.main.temp;
    const hum = data.main.humidity;

    let hi = -8.784695 + 1.61139411*temp + 2.338549*hum - 0.14611605*temp*hum;
    if(temp < 26) hi = temp;

    document.getElementById('tempVal').textContent = temp.toFixed(1) + '°C';
    document.getElementById('humVal').textContent = hum + '%';
    document.getElementById('hiVal').textContent = hi.toFixed(1) + '°C';
    document.getElementById('autoHI').value = hi.toFixed(1) + '°C';

    ['tempCard','humCard','hiCard','alertBox'].forEach(id => document.getElementById(id).style.display = 'block');

    document.getElementById('tbtLocation').value = city;

  } catch(e) {
    alert(e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}


// ✅✅✅ FIXED LOCATION FUNCTION
function useMyLocation() {
  const cityInput = document.getElementById('city');

  if (!navigator.geolocation) {
    alert('Geolocation not supported by your browser.');
    return;
  }

  document.getElementById('loading').style.display = 'block';

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      try {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
        const data = await res.json();

        if (data.cod !== 200) throw new Error('Unable to fetch location');

        const locationName = `${data.name},${data.sys.country}`;

        cityInput.value = locationName;
        document.getElementById('tbtLocation').value = locationName;

        checkHeat();

      } catch (err) {
        alert('Error fetching location data.');
        console.error(err);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    },
    (error) => {
      document.getElementById('loading').style.display = 'none';

      if (error.code === error.PERMISSION_DENIED) {
        alert('Location permission denied.');
      } else if (error.code === error.TIMEOUT) {
        alert('Location request timed out.');
      } else {
        alert('Location error occurred.');
      }
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}


// 🔹 HISTORY LOGGING (FIXED END PART)
function logActivity(action, details='') {
  const entry = { date: new Date().toLocaleString(), action, details };
  currentHistory.unshift(entry);
  if(currentHistory.length > 50) currentHistory.pop();
}

function loadHistory() {
  const container = document.getElementById('historyTableContainer');

  if(currentHistory.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#7f8c8d;">No history found.</p>';
    return;
  }

  container.innerHTML =
    `<table>
      <tr><th>Date</th><th>Action</th><th>Details</th></tr>` +
    currentHistory.map(h =>
      `<tr>
        <td>${h.date}</td>
        <td>${h.action}</td>
        <td>${h.details}</td>
      </tr>`
    ).join('') +
    `</table>`;
}
</script>
