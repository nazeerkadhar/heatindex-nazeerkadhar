<script>
const API_KEY = '0c0adab3c8cc353020af11d03821e94d';
let currentHistory = [];

// ✅ HEAT CHECK
async function checkHeat() {
  const city = document.getElementById('city').value.trim();
  if (!city) return alert('Please enter location.');

  document.getElementById('loading').style.display = 'block';

  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${API_KEY}`);
    const data = await res.json();

    if (data.cod !== 200) throw new Error('Location not found');

    const temp = data.main.temp;
    const hum = data.main.humidity;

    let hi = -8.784695 + 1.61139411*temp + 2.338549*hum - 0.14611605*temp*hum;
    if(temp < 26) hi = temp;

    document.getElementById('tempVal').textContent = temp.toFixed(1) + '°C';
    document.getElementById('humVal').textContent = hum + '%';
    document.getElementById('hiVal').textContent = hi.toFixed(1) + '°C';

    document.getElementById('tbtLocation').value = city;

    logActivity(`Checked Heat: ${city}`, `HI: ${hi.toFixed(1)}`);

  } catch (e) {
    alert(e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// ✅ FIXED LOCATION FUNCTION (WORKING)
function useMyLocation() {
  const cityInput = document.getElementById('city');
  const loading = document.getElementById('loading');

  if (!navigator.geolocation) {
    alert('Geolocation not supported');
    return;
  }

  loading.style.display = 'block';

  navigator.geolocation.getCurrentPosition(async (position) => {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    try {
      const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
      const data = await res.json();

      if (data.cod === 200) {
        const locationName = `${data.name},${data.sys.country}`;

        cityInput.value = locationName;
        document.getElementById('tbtLocation').value = locationName;

        // 🔥 Important: call after setting value
        checkHeat();
      } else {
        alert('Unable to fetch location name');
      }

    } catch (err) {
      console.error(err);
      alert('Error fetching location');
    } finally {
      loading.style.display = 'none';
    }

  }, (error) => {
    loading.style.display = 'none';
    alert('Location permission denied or unavailable');
  });
}

// ✅ HISTORY FIX (THIS WAS BREAKING YOUR CODE)
function logActivity(action, details='') {
  const entry = {
    date: new Date().toLocaleString(),
    action,
    details
  };
  currentHistory.unshift(entry);
}

function loadHistory() {
  const container = document.getElementById('historyTableContainer');

  if (currentHistory.length === 0) {
    container.innerHTML = '<p style="text-align:center;">No history</p>';
    return;
  }

  container.innerHTML =
    `<table>
      <tr>
        <th>Date</th>
        <th>Action</th>
        <th>Details</th>
      </tr>` +
    currentHistory.map(h =>
      `<tr>
        <td>${h.date}</td>
        <td>${h.action}</td>
        <td>${h.details}</td>
      </tr>`
    ).join('') +
    `</table>`;
}
</script>
